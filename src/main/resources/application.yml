spring:
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/sdvnews}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: -1
      maximum-pool-size: 3

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

supabase:
  jwks-url: ${SUPABASE_JWKS_URL:https://kdchjmssfmwvprsnyzlw.supabase.co/auth/v1/.well-known/jwks.json}

rss:
  feeds:
    - https://kuruma-news.jp/feed
    - https://motor-fan.jp/feed/
    - https://bestcarweb.jp/feed
    - https://www.webcg.net/list/feed/rss
    - https://rss.itmedia.co.jp/rss/2.0/monoist.xml

internal:
  batch-secret: ${INTERNAL_BATCH_SECRET:dummy-batch-secret}
  batch-secret-required: ${INTERNAL_BATCH_SECRET_REQUIRED:true}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

server:
  port: 8080
